<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0b0b10, #1a001f);
    color: #ffffff;
    margin: 0;
    padding: 20px;
    overflow-x: hidden;
  }

  /* 💌 CARTA */
  h1 {
    font-size: 20px;
    max-width: 90%;
    margin: auto;
    line-height: 1.5;
    background: rgba(20, 20, 25, 0.88);
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 0 20px rgba(106, 13, 173, 0.6);
    border: 2px solid #6a0dad;
  }

  /* 🐱 GATOS */
  .gatinhos img {
    width: 120px;
    margin: 10px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
  }

  /* 💖 ANEL */
  .anel {
    font-size: 40px;
    animation: brilho 1.5s infinite alternate;
    margin: 15px;
    color: #8a2be2;
  }

  @keyframes brilho {
    from {
      text-shadow: 0 0 5px #6a0dad;
    }
    to {
      text-shadow: 0 0 20px #8a2be2;
    }
  }

  /* BOTÕES */
  .botoes {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    position: relative;
  }

  button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
  }

  #sim {
    background-color: #6a0dad;
    color: white;
  }

  #sim:hover {
    background-color: #8a2be2;
    transform: scale(1.1);
  }

  #nao {
    background-color: #111111;
    color: white;
    position: relative;
  }

  /* 💗 CORAÇÕES */
  .heart {
    position: fixed;
    bottom: 0;
    font-size: 20px;
    animation: subir 4s linear forwards;
  }

  @keyframes subir {
    to {
      transform: translateY(-100vh);
      opacity: 0;
    }
  }

  /* 🌸 FLORES */
  .flor {
    position: fixed;
    top: -10px;
    font-size: 24px;
    animation: cair 5s linear forwards;
  }

  @keyframes cair {
    to {
      transform: translateY(110vh) rotate(360deg);
    }
  }
</style>
