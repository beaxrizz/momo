<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💍</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ffd1dc, #fff0f5);
      color: #d63384;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
    }

    /* 💌 CARTA */
    h1 {
      font-size: 20px;
      max-width: 90%;
      margin: auto;
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.85);
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.6);
      border: 3px dashed #ff69b4;
    }

    /* 🐱 GATOS */
    .gatinhos img {
      width: 120px;
      margin: 10px;
      border-radius: 15px;
      box-shadow: 0 0 10px pink;
    }

    /* 💖 ANEL BRILHANDO */
    .anel {
      font-size: 40px;
      animation: brilho 1.5s infinite alternate;
      margin: 15px;
    }

    @keyframes brilho {
      from { transform: scale(1); text-shadow: 0 0 5px pink; }
      to { transform: scale(1.2); text-shadow: 0 0 20px hotpink; }
    }

    /* BOTÕES */
    .botoes {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
      position: relative;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    #sim {
      background-color: #ff69b4;
      color: white;
    }

    #sim:hover {
      transform: scale(1.1);
    }

    #nao {
      background-color: #ffc0cb;
      color: white;
      position: absolute;
    }

    /* 💗 CORAÇÕES */
    .heart {
      position: fixed;
      bottom: 0;
      font-size: 20px;
      animation: subir 4s linear forwards;
    }

    @keyframes subir {
      to {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }

    /* 🌸 FLORES */
    .flor {
      position: fixed;
      top: -10px;
      font-size: 24px;
      animation: cair 5s linear forwards;
    }

    @keyframes cair {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>

<body>

<!-- 🎵 MÚSICA -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3d3c7c3b2f.mp3?filename=romantic-music-110397.mp3" type="audio/mpeg">
</audio>

<!-- 🐱 GATOS -->
<div class="gatinhos">
  <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
  <img src="https://media.giphy.com/media/v6aOjy0Qo1fIA/giphy.gif">
</div>

<!-- 💍 ANEL -->
<div class="anel">💍✨</div>

<!-- 💌 TEXTO -->
<h1>
oi mo, saiba que te amo mais que tudo nessa vida ❤️<br><br>
sempre estarei ao seu lado, nos piores e melhores momentos,<br>
vou segurar sua mão como ninguém nunca segurou.<br><br>
te prometo que sempre vou lutar por nós,<br>
você é a razão da minha vida!<br><br>
casa cmg mooo? 💍
</h1>

<!-- BOTÕES -->
<div class="botoes">
  <button id="sim" onclick="respostaSim()">sim mozin ❤️</button>
  <button id="nao" onmouseover="fugir()">nao sua chata</button>
</div>

<script>
function respostaSim() {
  alert("EU SABIAAAA 😭💖");

  // cresce botão sim
  const sim = document.getElementById("sim");
  sim.style.transform = "scale(1.5)";

  // flores
  for (let i = 0; i < 50; i++) {
    let flor = document.createElement("div");
    flor.className = "flor";
    flor.innerHTML = "🌸";
    flor.style.left = Math.random() * 100 + "vw";
    flor.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(flor);
    setTimeout(() => flor.remove(), 5000);
  }
}

function fugir() {
  const botao = document.getElementById("nao");

  const largura = window.innerWidth - 120;
  const altura = window.innerHeight - 120;

  botao.style.left = Math.random() * largura + "px";
  botao.style.top = Math.random() * altura + "px";
}

// corações
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 4000);
}, 500);
</script>

</body>
</html>
